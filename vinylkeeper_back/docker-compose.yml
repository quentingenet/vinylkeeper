services:
  vinylkeeper-db:
    image: postgres:17
    container_name: vinylkeeper-db
    env_file:
      - .env
    environment:
      - PGTZ=Europe/Paris
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - vk_network
    volumes:
      - vinylkeeper_postgres_db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  vinylkeeper-back:
    build:
      context: .
    container_name: vinylkeeper-api
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      vinylkeeper-db:
        condition: service_healthy
    networks:
      - vk_network
    volumes:
      - ./:/app
      - ./app/keys:/app/keys
      - vinylkeeper_image_cache:/app/cache/images
    env_file:
      - app/.env.production
    environment:
      - TZ=Europe/Paris
      - PYTHONUNBUFFERED=1
    working_dir: /app
    command: >
      sh -eu -c "
        echo '[boot] running alembic...';
        poetry run alembic upgrade head;
        echo '[boot] starting gunicorn with uvicorn workers...';
        exec poetry run gunicorn app.main:app -w 9 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --access-logfile - --error-logfile -
      "
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "2.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  vk_network:
    driver: bridge

volumes:
  vinylkeeper_postgres_db:
  vinylkeeper_image_cache:
